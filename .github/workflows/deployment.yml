name: Deploy Orion API

on:
  push:
    branches:
      - main
      - fix/pipeline

  pull_request:
    branches:
      - main

jobs:

  # ---------------------------
  # Stage 1: Source
  # ---------------------------
  source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Commit Information
        run: |
          echo "Commit SHA: ${{ github.sha }}"
          echo "Timestamp: $(date)"

  # ---------------------------
  # Stage 2: Build
  # ---------------------------
  build:
    needs: source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: .

  # ---------------------------
  # Stage 3: Lint
  # ---------------------------
  lint:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  # ---------------------------
  # Stage 4: Test
  # ---------------------------
  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  # ---------------------------
  # Stage 5: Security
  # ---------------------------
  security:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install Dependencies
        run: npm ci

      - name: Dependency Audit
        run: npm audit --audit-level=high

  # ---------------------------
  # Stage 6: Deploy Staging
  # ---------------------------
  deploy-staging:
    needs: security
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          echo "Staging deployment successful."

  # ---------------------------
  # Stage 7: Deploy Production
  # ---------------------------
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Deploy to Production
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DB_PASS: ${{ secrets.DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          echo "Deploying to production..."
          echo "Production deployment successful."

  # ---------------------------
  # Stage 8: Verify
  # ---------------------------
  verify:
    needs: deploy-production
    runs-on: ubuntu-latest

    steps:
      - name: Smoke Test
        run: |
          echo "Running smoke tests..."
          echo "Health check passed."

      - name: Deployment Successful
        if: success()
        run: echo "Deployment verified successfully."

      - name: Rollback
        if: failure()
        run: |
          echo "Smoke test failed."
          echo "Rolling back deployment..."

      - name: Notify Team
        if: always()
        run: echo "Deployment finished with status ${{ job.status }}"